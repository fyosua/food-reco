name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, nginx]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'nginx' && 'frontend' || 'backend' }}
          file: ${{ matrix.service == 'nginx' && 'frontend/Dockerfile' || 'backend/Dockerfile' }}
          build-args: ${{ matrix.service == 'nginx' && 'VITE_API_URL=https://foodapi.yosuaf.com' || '' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, pi5]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
          echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
          echo "DATABASE_URL=sqlite+aiosqlite:///./data/food_reco.db" >> .env
          echo "TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}" >> .env

      - name: Pull images and restart
        working-directory: infra
        run: |
          docker compose pull
          docker compose up -d
          docker image prune -f